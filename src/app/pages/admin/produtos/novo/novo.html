<main class="page-wrapper">

  <header class="page-header">
    <h1>Novo Produto</h1>
    <a routerLink="/admin" class="btn-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-sm"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Voltar para lista
    </a>
  </header>

  <form [formGroup]="form" (ngSubmit)="handleSave()" class="form-container">

    <section class="image-section">
      <div class="section-header">
        <p class="section-title">Imagens do Produto</p>

        <div class="upload-controls">
          <label class="upload-label" [class.disabled]="productImages().length >= 5 || uploading()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-sm"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            Selecionar Arquivos
            <input
              type="file"
              multiple
              accept="image/*"
              (change)="handleFileChange($event)"
              [disabled]="productImages().length >= 5 || uploading()"
              hidden
            />
          </label>

          @if (uploading()) {
            <span class="status-text uploading">Carregando...</span>
          } @else {
            <span class="status-text limit-info">Máximo 5 imagens</span>
          }
        </div>
      </div>

      <div class="image-list">
        @for (img of productImages(); track img.url; let i = $index) {
          <div class="image-row" [class.is-main-row]="img.isMain">
            <div class="image-info">
              <img [src]="img.url" alt="Pré-visualização" class="thumb-preview" />
              <button type="button" (click)="setMainImage(i)" class="btn-set-main">
                @if (img.isMain) {
                  <span class="main-active">
                    <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" class="icon-xs"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                    Imagem Principal
                  </span>
                } @else {
                  <span class="main-inactive">Definir como Principal</span>
                }
              </button>
            </div>
            <button type="button" (click)="removeImage(i)" class="btn-delete-img">Excluir</button>
          </div>
        }
      </div>
    </section>

    <section class="data-section">
      <div class="section-title-wrapper">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-md"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
        <h3>Dados do Produto</h3>
      </div>

      <div class="grid-2-col">
        <div class="form-group">
          <label for="name">Nome do Produto *</label>
          <input type="text" id="name" formControlName="name" class="form-control" [class.is-invalid]="form.get('name')?.invalid && form.get('name')?.touched" />
        </div>

        <div class="form-group">
          <label for="barcode">Código EAN (Código de Barras)</label>
          <input type="text" id="barcode" formControlName="barcode" class="form-control" />
        </div>
      </div>

      <div class="form-group full-width">
        <label for="description">Descrição do Produto</label>
        <textarea id="description" formControlName="description" rows="3" class="form-control"></textarea>
      </div>

      <div class="grid-4-col">
        <div class="form-group">
          <label for="weight">Peso / Volume</label>
          <input type="text" id="weight" formControlName="weight" placeholder="Ex: 500g, 1L" class="form-control" />
        </div>

        <div class="form-group">
          <label for="package_qty">Unidades por Caixa</label>
          <input type="number" id="package_qty" formControlName="package_qty" min="1" class="form-control" />
        </div>

        <div class="form-group col-span-2">
          <div class="label-with-action">
            <label for="category">Categoria *</label>
            <button type="button" (click)="isCreatingCategory.set(!isCreatingCategory())" class="btn-toggle-cat">
              @if (isCreatingCategory()) {
                Cancelar
              } @else {
                + Nova Categoria
              }
            </button>
          </div>

          @if (isCreatingCategory()) {
            <input type="text" id="category" formControlName="category" placeholder="Digite o nome da nova categoria" class="form-control new-cat-input" />
          } @else {
            <select id="category" formControlName="category" class="form-control">
              @for (cat of categories(); track cat.id) {
                <option [value]="cat.name">{{ cat.name }}</option>
              }
            </select>
          }
        </div>
      </div>
    </section>

    <footer class="form-footer">
      <a routerLink="/admin" class="btn-cancel">Cancelar</a>
      <button type="submit" [disabled]="loading() || uploading() || productImages().length === 0" class="btn-submit">
        @if (loading()) {
          Salvando...
        } @else {
          Salvar Produto
        }
      </button>
    </footer>

  </form>
</main>
